name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Instalar dependencias
        run: dart pub get

      - name: Verificar formato
        run: dart format --output=none --set-exit-if-changed .

      - name: Analizar
        run: dart analyze --fatal-infos

      - name: Correr tests
        run: dart test